x-toll-env: &toll-env
  MQTT_HOST: mosquitto_broker
  MQTT_PORT: 1883
  MQTT_TLS: "false"
  MQTT_USER: toll
  MQTT_PASS: pissirtoll

x-toll-base: &toll-base
  image: amazoncorretto:24
  volumes:
    - ../toll-service/app/build/libs/TollService.jar:/app/TollService.jar:ro
  working_dir: /app
  restart: unless-stopped

x-entry-manual: &entry-manual
  <<: *toll-base
  command: java --add-opens java.base/java.net=ALL-UNNAMED -cp TollService.jar upo.pissir.toll.MainEntryManual

x-entry-telepass: &entry-telepass
  <<: *toll-base
  command: java --add-opens java.base/java.net=ALL-UNNAMED -cp TollService.jar upo.pissir.toll.MainEntryTelepass

x-exit-manual: &exit-manual
  <<: *toll-base
  command: java --add-opens java.base/java.net=ALL-UNNAMED -cp TollService.jar upo.pissir.toll.MainExitManual

x-exit-telepass: &exit-telepass
  <<: *toll-base
  command: java --add-opens java.base/java.net=ALL-UNNAMED -cp TollService.jar upo.pissir.toll.MainExitTelepass

services:
  toll_entry_manual:
    <<: *entry-manual
    container_name: toll_entry_manual
